<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XXI Italian Drosophila Research Conference 2026 | L'Aquila</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/stemma-uni.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f4290;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      height: 72px;
      width: auto;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }

    .label {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      line-height: 1.1;
      margin-bottom: 1.25rem;
      letter-spacing: -0.01em;
    }

    .date {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 0.5rem;
    }

    .location {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 3rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #E7560D;
      margin: 0 auto 2.5rem;
    }

    .coming-soon {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      margin-bottom: 0.75rem;
    }

    .sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
    }

    .contact {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    .contact a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
    }

    .contact a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <img src="assets/uni-aquila-white.avif" alt="Università degli Studi dell'Aquila" class="logo">
  <p class="label">Coming Soon</p>
  <h1>XXI Italian <em>Drosophila</em><br>Research Conference</h1>
  <p class="date">July 7–9, 2026</p>
  <p class="location">L'Aquila · Polo Universitario Coppito</p>
  <div class="divider"></div>
  <p class="coming-soon">Website under construction</p>
  <p class="sub">All information will be available soon.</p>
  <p class="contact">For information: <a href="mailto:patrizia.morciano@guest.univaq.it">patrizia.morciano@guest.univaq.it</a></p>
</body>
</html>
